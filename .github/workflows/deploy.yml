name: Build and Push Curriculum Service to ACR

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_KEY: placeholder-service-key
          JWT_SECRET: placeholder-jwt-secret
          PORT: 3002
        run: npm test

  build-and-push:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/ms-curriculum-service:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/ms-curriculum-service:latest .

    - name: Push Docker Image to ACR
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/ms-curriculum-service:${{ github.sha }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/ms-curriculum-service:latest
